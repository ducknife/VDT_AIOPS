spring:
  application:
    name: aiops
  main:
    web-application-type: none   # CLI app — no Tomcat

  threads:
    virtual:
      enabled: true              # Project Loom virtual threads

  # ── PostgreSQL (AIOps state: alerts, incidents) ──────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5433/aiopsdb
    username: aiops
    password: aiops_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate         # Flyway owns schema — JPA only validates
    open-in-view: false

  # ── Flyway: auto-run migrations from db/migration/ on startup ────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

# ── Spring AI: Claude (Anthropic) ─────────────────────────────────────────
spring.ai:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY}
    chat:
      options:
        model: claude-sonnet-4-6
        max-tokens: 4096

# ── Docker ────────────────────────────────────────────────────────────────
docker:
  host: ${DOCKER_HOST:tcp://localhost:2375}

# ── AIOps tuning ──────────────────────────────────────────────────────────
aiops:
  anomaly:
    error-rate-threshold: 0.10    # >10% errors → anomaly
    latency-threshold-ms: 2000    # >2s avg latency → anomaly
    window-size: 20               # sliding window for z-score
  context:
    log-window-minutes: 5         # ±5 phút xung quanh event
  monitoring:
    poll-interval-ms: 5000        # scrape metrics mỗi 5 giây
    prometheus-url: http://localhost:9090 
    http-metrics-containers:
      - aiops-node-api
      
