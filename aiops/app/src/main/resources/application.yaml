spring:
  config:
    import: optional:file:.env[.properties]   # nạp aiops/app/.env -> ANTHROPIC_API_KEY thành property
  application:
    name: aiops
  main:
    web-application-type: servlet   # headless server: Tomcat foreground giữ JVM sống + phục vụ WebSocket
  task: 
    scheduling: 
      pool: 
        size: 4 # max 4: each thread for each task

  threads:
    virtual:
      enabled: true              # Project Loom virtual threads

  # ── PostgreSQL (AIOps state: alerts, incidents) ──────────────────────────
  datasource:
    # ${VAR:default} — default = giá trị chạy local; container set env đè lên (xem Chiêu 3)
    url: jdbc:postgresql://${AIOPS_DB_HOST:localhost}:${AIOPS_DB_PORT:5433}/${AIOPS_DB_NAME:aiopsdb}
    username: ${AIOPS_DB_USERNAME:aiops}
    password: ${AIOPS_DB_PASSWORD:aiops_secret}   # default chỉ để dev local; production inject qua secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate         # Flyway owns schema — JPA only validates
    open-in-view: false

  # ── Flyway: auto-run migrations from db/migration/ on startup ────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

# ── Spring AI: Claude (Anthropic) ─────────────────────────────────────────
spring.ai:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    chat:
      options:
        model: claude-sonnet-4-6
        max-tokens: 8192

# ── Web server (Tomcat) — cổng engine phục vụ WebSocket/REST cho React Ink TUI ──
server:
  port: ${SERVER_PORT:8088}   # 8088 vì host 8080 đã bị nginx (simulation) chiếm

# ── Docker ────────────────────────────────────────────────────────────────
docker:
  host: ${DOCKER_HOST:tcp://localhost:2375}

# ── AIOps tuning ──────────────────────────────────────────────────────────
aiops:
  agent: 
    max-turns: 8
    max-attempts: 3
    max-concurrent: 2 
  anomaly:
    rules:
      # ── redis ──
      - service: redis
        signal: memUsedPercent      # có trong profile redis
        greater-than: true
        threshold: 90
        type: REDIS_OOM
      - service: redis
        signal: isUp                # profile redis có isUp (redis_up)
        greater-than: false         # isUp < 1 (=0) → chết
        threshold: 1
        type: SERVICE_DOWN
      # ── postgres ──
      - service: postgres
        signal: isUp                # profile postgres có isUp (pg_up)
        greater-than: false
        threshold: 1
        type: SERVICE_DOWN
      - service: postgres
        signal: connUtilPercent     # % connection đã dùng / max_connections (robust khi max đổi)
        greater-than: true
        threshold: 80               # >80% slot connection → sắp cạn → DB_EXHAUSTION
        type: DB_EXHAUSTION
      # ── nginx ──
      - service: nginx
        signal: isUp                # profile nginx có isUp (nginx_up)
        greater-than: false
        threshold: 1
        type: SERVICE_DOWN
      # ── node-api ──
      - service: node-api
        signal: isUp                # profile node-api có isUp (up{job="node-api"})
        greater-than: false
        threshold: 1
        type: SERVICE_DOWN
      - service: node-api
        signal: latencyMs           # P99 latency (ms) từ histogram_quantile
        greater-than: true
        threshold: 2000             # P99 > 2000ms → 1% request chậm nhất vượt 2s
        type: HIGH_LATENCY
      - service: node-api
        signal: errorRate           # profile node-api có errorRate
        greater-than: true
        threshold: 1.0              # errorRate = lỗi/GIÂY (rate[1m]), KHÔNG phải %. Tune theo tải.
        type: ERROR_RATE_SPIKE
  context:
    log-window-minutes: 5         # ±5 phút xung quanh event
  log: 
    flush-interval-ms: 2000       # flush logs mỗi 2s
  monitoring:
    poll-interval-ms: 5000        # scrape metrics mỗi 5s
    prometheus-url: ${PROMETHEUS_URL:http://localhost:9090}
  correlation: 
    quiet-window-seconds: 30 # 30s không có alert mới gộp -> dispatch
    max-wait-seconds: 120       # chờ tối đa 2 phút rồi gửi đại -> trường hợp alert rỉ rải cứ cứ 29s lại có 1 cái, làm quiet 30s không kích hoạt


