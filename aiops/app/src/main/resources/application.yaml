spring:
  application:
    name: aiops
  main:
    web-application-type: servlet   # headless server: Tomcat foreground giữ JVM sống + phục vụ WebSocket

  threads:
    virtual:
      enabled: true              # Project Loom virtual threads

  # ── PostgreSQL (AIOps state: alerts, incidents) ──────────────────────────
  datasource:
    # ${VAR:default} — default = giá trị chạy local; container set env đè lên (xem Chiêu 3)
    url: jdbc:postgresql://${AIOPS_DB_HOST:localhost}:${AIOPS_DB_PORT:5433}/${AIOPS_DB_NAME:aiopsdb}
    username: ${AIOPS_DB_USERNAME:aiops}
    password: ${AIOPS_DB_PASSWORD:aiops_secret}   # default chỉ để dev local; production inject qua secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate         # Flyway owns schema — JPA only validates
    open-in-view: false

  # ── Flyway: auto-run migrations from db/migration/ on startup ────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

# ── Spring AI: Claude (Anthropic) ─────────────────────────────────────────
spring.ai:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY}
    chat:
      options:
        model: claude-sonnet-4-6
        max-tokens: 4096

# ── Web server (Tomcat) — cổng engine phục vụ WebSocket/REST cho React Ink TUI ──
server:
  port: ${SERVER_PORT:8088}   # 8088 vì host 8080 đã bị nginx (simulation) chiếm

# ── Docker ────────────────────────────────────────────────────────────────
docker:
  host: ${DOCKER_HOST:tcp://localhost:2375}

# ── AIOps tuning ──────────────────────────────────────────────────────────
aiops:
  anomaly:
    error-rate-threshold: 0.10    # >10% errors → anomaly
    latency-threshold-ms: 2000    # >2s avg latency → anomaly
    window-size: 20               # sliding window for z-score
  context:
    log-window-minutes: 5         # ±5 phút xung quanh event
  log: 
    flush-interval-ms: 2000       # flush logs mỗi 2
  monitoring:
    poll-interval-ms: 5000        # scrape metrics mỗi 5
    prometheus-url: ${PROMETHEUS_URL:http://localhost:9090}
    http-metrics-containers:
      - node-api
      
