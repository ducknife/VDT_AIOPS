name: aiops-platform #name of backend project

services:

  # ── PostgreSQL — AIOps state (alerts, incidents) + logs ──────────────────
  # Port 5433 để không đụng với postgres app đang chạy ở 5432
  postgres-aiops:
    image: postgres:15-alpine
    container_name: aiops-postgres-state
    environment:
      POSTGRES_DB:       aiopsdb
      POSTGRES_USER:     aiops
      POSTGRES_PASSWORD: ${AIOPS_DB_PASSWORD}   # secret ← .env (đã gitignore)
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiops -d aiopsdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_aiops_data:/var/lib/postgresql/data
    networks:
      - aiops-sim-net

  # ── Prometheus — metrics collection ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: aiops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"   # scrape node-api trên host network
    networks:
      - aiops-sim-net

  # ── Docker socket proxy — bắc cầu /var/run/docker.sock -> TCP 2375 nội bộ ──
  # Engine nối tcp://docker-proxy:2375 (docker-java chạy TCP ổn định); giám khảo KHÔNG cần
  # bật "expose daemon on 2375" trên Docker Desktop. TCP chỉ mở trong mạng nội bộ.
  docker-proxy:
    image: alpine/socat
    container_name: aiops-docker-proxy
    command: TCP-LISTEN:2375,fork,reuseaddr UNIX-CONNECT:/var/run/docker.sock
    user: "0:0"   # root để đọc socket
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:2375:2375"   # mở ra host (chỉ localhost) -> chạy engine bằng mvn local nối tcp://localhost:2375 mà KHỎI bật toggle 2375
    networks:
      - aiops-sim-net
    restart: unless-stopped

  # ── AIOps Engine — bộ não always-on (Java Spring Boot) ───────────────────
  aiops-engine:
    build:
      context: ../app          # từ infra/ trỏ sang aiops/app/ (bẫy build-context)
      dockerfile: Dockerfile
    container_name: aiops-engine
    environment:
      # ── Docker API: qua socat proxy (TCP nội bộ) — KHỎI bật 2375 trên Docker Desktop ──
      DOCKER_HOST: tcp://docker-proxy:2375
      # ── State DB: tên SERVICE nội bộ + port NỘI BỘ (không phải localhost:5433) ──
      AIOPS_DB_HOST: postgres-aiops
      AIOPS_DB_PORT: "5432"
      AIOPS_DB_NAME: aiopsdb
      AIOPS_DB_USERNAME: aiops
      AIOPS_DB_PASSWORD: ${AIOPS_DB_PASSWORD}   # secret ← .env (CÙNG biến với postgres-aiops)
      # ── Prometheus: tên service, không phải localhost ──
      PROMETHEUS_URL: http://prometheus:9090
      # ── Claude: application.yaml KHÔNG có default → bắt buộc phải có ──
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}   # secret ← .env
      SERVER_PORT: "8088"
    ports:
      - "127.0.0.1:8088:8088"
    networks:
      - aiops-sim-net
    depends_on:
      docker-proxy:
        condition: service_started
      postgres-aiops:
        condition: service_healthy
      prometheus:
        condition: service_started
    restart: unless-stopped # self wakeup

volumes:
  postgres_aiops_data:

networks:
  aiops-sim-net:
    external: true   # mạng đã được tạo bên file simulation rồi
    name: aiops-shared-network
