global:
  scrape_interval: 5s

scrape_configs:
  - job_name: node-api
    static_configs:
      - targets: ['aiops-node-api:3000']
    metrics_path: /metrics

  - job_name: nginx
    static_configs:
      - targets: ['aiops-nginx-exporter:9113']

  - job_name: postgres
    static_configs:
      - targets: ['aiops-postgres-exporter:9187']

  - job_name: redis
    static_configs:
      - targets: ['aiops-redis-exporter:9121']