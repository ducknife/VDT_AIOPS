worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Log format đủ chi tiết để AIOps parse: IP, method, path, status, latency
    log_format main '$remote_addr - [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    'rt=$request_time upstream=$upstream_addr';

    # /dev/stdout và /dev/stderr → Docker capture được bằng docker logs
    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    keepalive_timeout 65;

    # Upstream block — định nghĩa backend servers
    # Có thể thêm nhiều server vào đây để load balance
    upstream node_api_backend {
        server node-api:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # /nginx_status — AIOps scrape endpoint này lấy active connections, requests/s
        location /nginx_status {
            stub_status on;
            # Trong production: chỉ cho phép internal IPs
            allow all;
        }

        # Proxy mọi request xuống node-api
        location / {
            proxy_pass         http://node_api_backend;
            proxy_http_version 1.1;

            # Forward IP thật của client
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Cần thiết cho keepalive với upstream
            proxy_set_header   Connection        "";

            proxy_read_timeout    30s;
            proxy_connect_timeout  5s;
        }
    }
}
